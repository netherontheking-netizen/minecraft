<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Fix - Interactive</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        
        /* מסך ההוראות - שיפרתי אותו שיהיה ברור וקליקבילי */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; cursor: pointer; text-align: center;
        }
        
        #overlay h1 { font-size: 3rem; color: #4CAF50; margin-bottom: 5px; }
        #overlay p { font-size: 1.2rem; color: #ccc; }

        #crosshair {
            position: fixed; top: 50%; left: 50%; width: 20px; height: 20px;
            transform: translate(-50%, -50%); color: white; font-size: 24px;
            pointer-events: none; z-index: 50; display: none;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>נא ללחוץ כאן</h1>
        <p>כדי לשחרר את העכבר ולהתחיל לשחק</p>
        <div style="margin-top: 20px; color: #888; font-size: 0.9rem;">
            תנועה: ' , ד , ג , ש | קפיצה: Space | יציאה: ESC
        </div>
    </div>

    <div id="crosshair">+</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(light);

        const controls = new PointerLockControls(camera, document.body);
        const overlay = document.getElementById('overlay');
        const crosshair = document.getElementById('crosshair');

        overlay.addEventListener('click', () => {
            console.log("Attempting to lock pointer...");
            controls.lock();
        });

        controls.addEventListener('lock', () => {
            console.log("Pointer Locked!");
            overlay.style.display = 'none';
            crosshair.style.display = 'block';
        });

        controls.addEventListener('unlock', () => {
            console.log("Pointer Unlocked");
            overlay.style.display = 'flex';
            crosshair.style.display = 'none';
        });

            for(let z=-8; z<8; z++) {
                const b = new THREE.Mesh(geo, mat);
                b.position.set(x, 0, z);
                scene.add(b);
            }
        }
